apiVersion: apps/v1
kind: Deployment

metadata:
  name: analytics-service
  namespace: togglemaster

spec:
  replicas: 2

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: analytics-service

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: analytics-service

    spec:
      containers:
      - name: analytics-service

        image: 523694734848.dkr.ecr.us-east-1.amazonaws.com/analytics-service:latest
        imagePullPolicy: Always

        ports:
        - containerPort: 8005

        env:
        - name: PORT
          value: "8005"

        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: togglemaster-config
              key: AWS_REGION

        - name: AWS_SQS_URL
          valueFrom:
            configMapKeyRef:
              name: togglemaster-config
              key: AWS_SQS_URL

        - name: AWS_DYNAMODB_TABLE
          valueFrom:
            configMapKeyRef:
              name: togglemaster-config
              key: AWS_DYNAMODB_TABLE

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8005
          initialDelaySeconds: 30
          periodSeconds: 10
