apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: togglemaster

spec:
  replicas: 2

  revisionHistoryLimit: 5

  selector:
    matchLabels:
      app: auth-service

  strategy:
    type: RollingUpdate

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:
      - name: auth-service

        image: 523694734848.dkr.ecr.us-east-1.amazonaws.com/auth-service:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8001

        env:

        - name: PORT
          value: "8001"

        - name: DATABASE_URL
          valueFrom:
            configMapKeyRef:
              name: togglemaster-config
              key: AUTH_DATABASE_URL

        - name: MASTER_KEY
          valueFrom:
            secretKeyRef:
              name: togglemaster-secret
              key: MASTER_KEY

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "500m"
            memory: "512Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 8001

          initialDelaySeconds: 10
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 8001

          initialDelaySeconds: 30
          periodSeconds: 10
